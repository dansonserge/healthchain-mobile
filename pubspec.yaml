name: healthchain_mobile
description: HealthChain Optimizer — Clinical Supply Chain Platform
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State & DI ──────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ──────────────────────────────────────────────
  go_router: ^14.0.0

  # ── Networking ──────────────────────────────────────────────
  dio: ^5.4.3
  retrofit: ^4.1.0
  dio_smart_retry: ^6.0.0            # Exponential backoff retry
  dio_cache_interceptor: ^3.4.4      # GET response caching
  pretty_dio_logger: ^1.3.1          # Debug HTTP logs (dev only)

  # ── Offline / Local DB ──────────────────────────────────────
  drift: ^2.18.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.0

  # ── Secure Storage ──────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.2.0                 # Biometrics

  # ── Connectivity ────────────────────────────────────────────
  connectivity_plus: ^6.0.3
  internet_connection_checker_plus: ^2.5.0

  # ── UI & Design System ──────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0            # Declarative animations
  shimmer: ^3.0.0                    # Skeleton loaders
  cached_network_image: ^3.3.1       # Image caching with placeholders
  flutter_svg: ^2.0.10+1             # SVG icons and illustrations

  # ── Scanner ─────────────────────────────────────────────────
  google_mlkit_text_recognition: ^0.14.0 # Hardware-accelerated OCR
  camera: ^0.11.0                    # Direct camera control (scan modes)

  # ── Charts ──────────────────────────────────────────────────
  fl_chart: ^0.68.0                  # Inventory trend lines, analytics

  # ── Notifications & Backend ─────────────────────────────────

  # ── Forms & Validation ──────────────────────────────────────
  reactive_forms: ^17.0.1            # Reactive, typed form engine
  form_validator: ^2.1.1

  # ── Localization ────────────────────────────────────────────
  easy_localization: ^3.0.7

  # ── DateTime & Formatting ───────────────────────────────────
  intl: ^0.19.0
  timeago: ^3.7.0                    # "2 minutes ago" relative time

  # ── Utils ───────────────────────────────────────────────────
  freezed_annotation: ^2.4.4        # Immutable models
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  collection: ^1.18.0

  # ── Feedback & Haptics ──────────────────────────────────────
  vibration: ^1.9.0                  # Precise haptic feedback for scanner

  # ── Security ────────────────────────────────────────────────
  encrypt: ^5.0.3
  appwrite: ^17.1.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.18.0
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  mocktail: ^1.0.3                   # Type-safe mocking for unit tests

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/translations/
    - assets/images/
    - assets/icons/
