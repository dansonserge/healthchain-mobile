name: healthchain_mobile
description: HealthChain Optimizer — Clinical Supply Chain Platform
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State & DI ──────────────────────────────────────────────
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # ── Navigation ──────────────────────────────────────────────
  go_router: ^17.2.1

  # ── Networking ──────────────────────────────────────────────
  dio: ^5.4.3
  retrofit: ^4.1.0
  dio_smart_retry: ^7.0.1            # Exponential backoff retry
  dio_cache_interceptor: ^4.0.6      # GET response caching
  pretty_dio_logger: ^1.3.1          # Debug HTTP logs (dev only)

  # ── Offline / Local DB ──────────────────────────────────────
  drift: ^2.18.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.0

  # ── Secure Storage ──────────────────────────────────────────
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.1                 # Biometrics

  # ── Connectivity ────────────────────────────────────────────
  connectivity_plus: ^6.0.2
  internet_connection_checker_plus: ^2.5.0

  # ── UI & Design System ──────────────────────────────────────
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.0            # Declarative animations
  shimmer: ^3.0.0                    # Skeleton loaders
  cached_network_image: ^3.3.1       # Image caching with placeholders
  flutter_svg: ^2.0.10+1             # SVG icons and illustrations

  # ── Scanner ─────────────────────────────────────────────────
  google_mlkit_text_recognition: ^0.15.1 # Hardware-accelerated OCR
  camera: ^0.12.0+1                    # Direct camera control (scan modes)

  # ── Charts ──────────────────────────────────────────────────
  fl_chart: ^1.2.0                  # Inventory trend lines, analytics

  # ── Notifications & Backend ─────────────────────────────────

  # ── Forms & Validation ──────────────────────────────────────
  reactive_forms: ^18.2.2            # Reactive, typed form engine
  form_validator: ^2.1.1

  # ── Localization ────────────────────────────────────────────
  easy_localization: ^3.0.7

  # ── DateTime & Formatting ───────────────────────────────────
  intl: ^0.20.2
  timeago: ^3.7.0                    # "2 minutes ago" relative time

  # ── Utils ───────────────────────────────────────────────────
  freezed_annotation: ^3.1.0        # Immutable models
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  collection: ^1.18.0

  # ── Feedback & Haptics ──────────────────────────────────────
  vibration: ^3.1.8                  # Precise haptic feedback for scanner

  # ── Security ────────────────────────────────────────────────
  encrypt: ^5.0.3
  appwrite: ^23.1.0
  flutter_dotenv: ^6.0.0
  google_maps_flutter: ^2.17.0
  location: ^8.0.1
  map_launcher: ^4.5.0
  share_plus: ^12.0.2
  url_launcher: ^6.3.2
  flutter_sliding_up_panel: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.18.0
  retrofit_generator: ^10.2.5
  riverpod_generator: ^4.0.3
  json_serializable: ^6.8.0
  freezed: ^3.2.5
  mocktail: ^1.0.3                   # Type-safe mocking for unit tests

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/translations/
    - assets/images/
    - assets/icons/

dependency_overrides:
  device_info_plus: ^10.1.0
